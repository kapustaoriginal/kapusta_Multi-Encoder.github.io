        const UPSIDE = {'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ','k':'ʞ','l':'l','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ','u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z','A':'∀','B':'ᗺ','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'⅁','H':'H','I':'I','J':'ſ','K':'⋊','L':'˥','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Ό','R':'ᴚ','S':'S','T':'⊥','U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z','1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ㄣ','5':'ϛ','6':'9','7':'ㄥ','8':'8','9':'6','0':'0','.':'˙',',':"'",'?':'¿','!':'¡',"'":',','"':'„','(':')',')':'(','[':']',']':'[','{':'}','}':'{','<':'>','>':'<','_':'‾'};

        // --- Вспомогательные функции для Base32 ---
        const b32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        function encodeBase32(str) {
            const bytes = new TextEncoder().encode(str);
            let bits = 0, value = 0, output = '';
            for (let i = 0; i < bytes.length; i++) {
                value = (value << 8) | bytes[i];
                bits += 8;
                while (bits >= 5) {
                    output += b32chars[(value >>> (bits - 5)) & 31];
                    bits -= 5;
                }
            }
            if (bits > 0) output += b32chars[(value << (5 - bits)) & 31];
            while (output.length % 8 !== 0) output += '=';
            return output;
        }
        function decodeBase32(str) {
            str = str.replace(/=+$/, '').toUpperCase();
            let bits = 0, value = 0, index = 0;
            const bytes = new Uint8Array(str.length * 5 / 8 | 0);
            for (let i = 0; i < str.length; i++) {
                const val = b32chars.indexOf(str[i]);
                if (val === -1) continue;
                value = (value << 5) | val;
                bits += 5;
                if (bits >= 8) {
                    bytes[index++] = (value >>> (bits - 8)) & 255;
                    bits -= 8;
                }
            }
            return new TextDecoder().decode(bytes.slice(0, index));
        }

        // --- Копирование ---
        function copyToClipboard(elementId) {
            const el = document.getElementById(elementId);
            el.select();
            el.setSelectionRange(0, 99999);
            try {
                document.execCommand('copy');
                updateStatus("Скопировано!");
            } catch (err) {

        // --- Шифрование AES ---
        const AES_CRYPTO = {
            async deriveKey(password, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password || "default"), "PBKDF2", false, ["deriveKey"]);
                return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async encrypt(text, password) {
                const enc = new TextEncoder();
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const key = await this.deriveKey(password, salt);
                const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
                const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
                combined.set(salt, 0); combined.set(iv, 16); combined.set(new Uint8Array(encrypted), 28);
                return btoa(String.fromCharCode(...combined));
            },
            async decrypt(b64, password) {
                const data = new Uint8Array([...atob(b64)].map(c => c.charCodeAt(0)));
                const key = await this.deriveKey(password, data.slice(0, 16));
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: data.slice(16, 28) }, key, data.slice(28));
                return new TextDecoder().decode(decrypted);
            }
        };
        // --- Хеширование ---
        async function hashText(algo, text) {
            if (algo === 'md5') return md5(text);
            const msgUint8 = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest(algo.toUpperCase().replace('SHA', 'SHA-'), msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const ZALGO_CHARS = ['\u030d', '\u030e', '\u0304', '\u0305', '\u033f', '\u0311', '\u0306', '\u0310', '\u0352', '\u033c', '\u0344', '\u034a', '\u034b', '\u034c', '\u0300', '\u0301', '\u0302', '\u0303', '\u0307', '\u0308', '\u0309', '\u030a', '\u030b', '\u030c', '\u030e', '\u0311', '\u0312', '\u0313', '\u0314', '\u031a', '\u031b', '\u0340', '\u0341', '\u0343', '\u0344', '\u0346', '\u034d', '\u034e', '\u0350', '\u0351', '\u0357', '\u0358', '\u0363', '\u0364', '\u0365', '\u0366', '\u0367', '\u0368', '\u0369', '\u036a', '\u036b', '\u036c', '\u036d', '\u036e', '\u036f'];
        function makeZalgo(text, level) {
            let result = "";
            for(let char of text) {
                result += char;
                for(let i=0; i<level; i++) result += ZALGO_CHARS[Math.floor(Math.random() * ZALGO_CHARS.length)];

            return result;

            optGroups.forEach(group => {

                    const matches = opt.textContent.toLowerCase().includes(term);

                        opt.classList.remove('hidden-option');
                        hasVisible = true;

                    } else {
                        opt.classList.add('hidden-option');

            const keyLabel = document.getElementById('keyLabel');
            const passCont = document.getElementById('passwordContainer');
            const infoText = document.getElementById('infoText');
            const infoTitle = document.getElementById('infoTitle');
  
            const decodeBtn = document.getElementById('decodeBtn');

            const needsKey = (val === 'aes' || val === 'caesar');
            if (needsKey) {
                keyLabel.innerText = val === 'aes' ? "Секретный пароль" : "Сдвиг (число)";
                passCont.style.opacity = "1";
        
                passCont.style.pointerEvents = "auto";
                passCont.classList.remove('grayscale');
            } else {
                passCont.style.opacity = "0.4";
                passCont.style.pointerEvents = "none";
                passCont.classList.add('grayscale');
            }

            const selectedText = this.options[this.selectedIndex].text;
            infoTitle.innerText = `О методе: ${selectedText}`;
            infoText.innerText = METHOD_DOCS[val] || "Описание для этого метода уточняется.";
            const irrev = ['md5', 'sha1', 'sha256', 'sha384', 'sha512', 'zalgo_mini', 'zalgo_normal', 'zalgo_big'];
            if (irrev.includes(val)) {
                decodeBtn.style.opacity = "0.5";
                decodeBtn.style.pointerEvents = "none";
            } else {
                decodeBtn.style.opacity = "1";
                decodeBtn.style.pointerEvents = "auto";
            }
        });
        // --- Основная логика ---
        async function handleAction(type) {
            const method = methodSelect.value;
            const key = document.getElementById('cipherPassword').value;
            const plainArea = document.getElementById('plainText');
            const resultArea = document.getElementById('resultText');
            try {
                if (type === 'encode') {
                    const input = plainArea.value;
                    if(!input) return;
                    let res = "";

                    switch(method) {
                        case 'aes': res = await AES_CRYPTO.encrypt(input, key);
                            break;
                        case 'md5':
                        case 'sha1':
                        case 'sha256':
                        case 'sha384':
                       
                        case 'sha512': res = await hashText(method, input); break;
                        case 'caesar': 
                            const s = parseInt(key) ||
                                3;
                            res = input.replace(/[a-zа-яё]/gi, c => {
                                const code = c.charCodeAt(0);
                                if (code >= 65 && code <= 90) return String.fromCharCode((code - 65 + s) % 26 + 65);
          
                                if (code >= 97 && code <= 122) return String.fromCharCode((code - 97 + s) % 26 + 97);
                                if (code >= 1040 && code <= 1071) return String.fromCharCode((code - 1040 + s) % 32 + 1040);
            
                                if (code >= 1072 && code <= 1103) return String.fromCharCode((code - 1072 + s) % 32 + 1072);
                                return c;
                            });
                            break;
                        case 'atbash': 
                            res = input.replace(/[a-zа-яё]/gi, c => {
                                const code = c.charCodeAt(0);
                             
                                if (code >= 65 && code <= 90) return String.fromCharCode(155 - code);
                                if (code >= 97 && code <= 122) return String.fromCharCode(219 - code);
                                if (code >= 1040 && code <= 1071) return String.fromCharCode(2111 - 
                                code);
                                if (code >= 1072 && code <= 1103) return String.fromCharCode(2175 - code);
                                return c;
                        
                            });
                            break;
                        case 'rot13': res = input.replace(/[a-z]/gi, c => String.fromCharCode((c.charCodeAt(0) - (c < 'a' ? 65 : 97) + 13) % 26 + (c < 'a' ? 65 : 97)));
                            break;
                        case 'reverser': res = input.split('').reverse().join(''); break;
                        case 'uppercase': res = input.toUpperCase(); break;
                        case 'lowercase': res = input.toLowerCase(); break;
                        case 'randomcase': res = input.split('').map(c => Math.random() > 0.5 ? c.toUpperCase() : c.toLowerCase()).join(''); break;
                        case 'upsidedown': res = input.split('').reverse().map(c => UPSIDE[c] || c).join(''); break;
                        case 'superscript': res = input.split('').map(c => SUPERSCRIPT[c.toLowerCase()] || c).join(''); break;
                        case 'subscript': res = input.split('').map(c => SUBSCRIPT[c.toLowerCase()] || c).join(''); break;
                        case 'zalgo_mini': res = makeZalgo(input, 2); break;
                        case 'zalgo_normal': res = makeZalgo(input, 5); break;
                        case 'zalgo_big': res = makeZalgo(input, 15); break;
                        case 'morse': 
                            res = input.toUpperCase().split('').map(c => MORSE[c] || '').filter(x => x !== '').join(' ');
                            break;
                        case 'nato': res = input.toUpperCase().split('').map(c => NATO[c] || c).join(' '); break;
                        case 'wingding': res = input.split('').map(c => WINGDINGS[c] || c).join(''); break;
                        case 'ascii': res = input.split('').map(c => c.charCodeAt(0)).join(' '); break;
                        case 'octal': res = Array.from(new TextEncoder().encode(input)).map(b => b.toString(8).padStart(3, '0')).join(' ');
                            break;
                        case 'binary': res = Array.from(new TextEncoder().encode(input)).map(b => b.toString(2).padStart(8, '0')).join(' '); break;
                        case 'html': res = input.replace(/[\u00A0-\u9999<>\&]/g, i => '&#' + i.charCodeAt(0) + ';'); break;
                        case 'url': res = encodeURIComponent(input); break;
                        case 'unicode': res = input.split('').map(c => '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0')).join(''); break;
                        case 'base32': res = encodeBase32(input); break;
                        case 'base64': res = btoa(unescape(encodeURIComponent(input))); break;
                        case 'hex': res = Array.from(new TextEncoder().encode(input)).map(b => b.toString(16).padStart(2, '0')).join(''); break;
                    }
                    resultArea.value = res;
                } else {
                    const input = resultArea.value;
                    if(!input) return;
                    let res = "";

                    switch(method) {
                        case 'aes': res = await AES_CRYPTO.decrypt(input, key);
                            break;
                        case 'caesar': 
                            const s = parseInt(key) ||
                                3;
                            res = input.replace(/[a-zа-яё]/gi, c => {
                                const code = c.charCodeAt(0);
                                if (code >= 65 && code <= 90) return String.fromCharCode((code - 65 - s + 260) % 26 + 65);
        
                                if (code >= 97 && code <= 122) return String.fromCharCode((code - 97 - s + 260) % 26 + 97);
                                if (code >= 1040 && code <= 1071) return String.fromCharCode((code - 1040 - s + 320) % 32 + 1040);
      
                                if (code >= 1072 && code <= 1103) return String.fromCharCode((code - 1072 - s + 320) % 32 + 1072);
                                return c;
                      
                            });
                            break;
                        case 'atbash': 
                             res = input.replace(/[a-zа-яё]/gi, c => {
                                const code = c.charCodeAt(0);
                     
                                if (code >= 65 && code <= 90) return String.fromCharCode(155 - code);
                                if (code >= 97 && code <= 122) return String.fromCharCode(219 - code);
                                if (code >= 
                                1040 && code <= 1071) return String.fromCharCode(2111 - code);
                                if (code >= 1072 && code <= 1103) return String.fromCharCode(2175 - code);
                                return c;
                
                            });
                            break;
                        case 'rot13': res = input.replace(/[a-z]/gi, c => String.fromCharCode((c.charCodeAt(0) - (c < 'a' ? 65 : 97) + 13) % 26 + (c < 'a' ? 65 : 97)));
                            break;
                        case 'reverser': res = input.split('').reverse().join(''); break;
                        case 'upsidedown': 
                            const invUpside = Object.fromEntries(Object.entries(UPSIDE).map(a => a.reverse()));
                            res = input.split('').reverse().map(c => invUpside[c] || c).join('');
                            break;
                        case 'morse': 
                            const invMorse = Object.fromEntries(Object.entries(MORSE).map(a => a.reverse()));
                            res = input.split(' ').map(c => invMorse[c] || '').join('');
                            break;
                        case 'nato':
                            const invNato = Object.fromEntries(Object.entries(NATO).map(a => [a[1].toUpperCase(), a[0]]));
                            res = input.toUpperCase().split(' ').map(c => invNato[c] || '').join('');
                            break;
                        case 'wingding':
                            const invWing = Object.fromEntries(Object.entries(WINGDINGS).map(a => a.reverse()));
                            res = input.split('').map(c => invWing[c] || c).join('');
                            break;
                        case 'ascii': 
                            res = input.split(' ').filter(x => x !== '').map(o => String.fromCharCode(parseInt(o))).join(''); 
                            break;
                        case 'octal': res = new TextDecoder().decode(new Uint8Array(input.split(' ').filter(x => x).map(o => parseInt(o, 8))));
                            break;
                        case 'binary': res = new TextDecoder().decode(new Uint8Array(input.split(' ').filter(x => x).map(o => parseInt(o, 2)))); break;
                        case 'html': const t = document.createElement("textarea"); t.innerHTML = input; res = t.value; break;
                        case 'url': res = decodeURIComponent(input); break;
                        case 'unicode': res = input.replace(/\\u([a-fA-F0-9]{4})/g, (g, m) => String.fromCharCode(parseInt(m, 16))); break;
                        case 'base32': res = decodeBase32(input); break;
                        case 'base64': res = decodeURIComponent(escape(atob(input))); break;
                        case 'hex': res = new TextDecoder().decode(new Uint8Array(input.match(/.{1,2}/g).map(b => parseInt(b, 16)))); break;
                        default: res = "Метод необратим или не поддерживается.";
                    }
                    plainArea.value = res;
                }
                updateStatus("Успех");
            } catch(e) {
                updateStatus("Ошибка", true);
            }
        }

        function updateStatus(msg, err = false) {
            const s = document.getElementById('statusLabel');
            s.innerText = msg;
            s.className = err ? "text-red-400 italic bg-red-900/20 px-3 py-1 rounded-full" : "text-emerald-400 italic bg-emerald-900/20 px-3 py-1 rounded-full";
            setTimeout(() => {
                s.innerText = "Ожидание";
                s.className = "text-slate-500 italic bg-slate-800/50 px-3 py-1 rounded-full";
            }, 2000);
        }

        function clearFields() {
            document.querySelectorAll('textarea').forEach(t => t.value = "");
            document.getElementById('cipherPassword').value = "";
        }

        window.onload = () => methodSelect.dispatchEvent(new Event('change'));
    </script>
